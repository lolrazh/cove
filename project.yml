name: Cove
options:
  bundleIdPrefix: com.cove
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  Cove:
    type: application
    platform: macOS
    sources:
      - path: Cove/Sources
      - path: Cove/Resources/easylist.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cove.browser
        PRODUCT_NAME: Cove
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Cove/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Cove/Resources/Cove.entitlements
