name: Vayu
options:
  bundleIdPrefix: com.vayu
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  Vayu:
    type: application
    platform: macOS
    sources:
      - path: Vayu/Sources
      - path: Vayu/Resources/easylist.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vayu.browser
        PRODUCT_NAME: Vayu
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Vayu/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Vayu/Resources/Vayu.entitlements
